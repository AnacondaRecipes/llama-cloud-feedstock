{% set name = "llama-cloud" %}
{% set version = "0.1.46" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/llama_cloud-{{ version }}.tar.gz
  sha256: e86f8791c053590d70cc59e0fc13ce72f9b681a8e658bc61df86d0285288d8ee

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - poetry-core
  run:
    - python >=3.9
    - pydantic >=1.10
    - httpx >=0.20.0
    - certifi >=2024.7.4

test:
  imports:
    - llama_cloud
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://cloud.llamaindex.ai
  summary: Turn your enterprise data into production-ready LLM applications
  description: |
    llama-cloud is the Python client for LlamaCloud, providing APIs for
    building production-ready LLM applications.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/run-llama/llama_cloud

extra:
  recipe-maintainers:
    - jan-janssen
